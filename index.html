
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IBD3D PLUGIN PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-light: #ffffff;
      --bg-dark: #050505; /* Deeper black for higher contrast */
    }
    
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .dark body {
      background-color: var(--bg-dark);
      color: #f4f4f5;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Refined Glass effect */
    .glass {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }

    .dark .glass {
      background-color: rgba(5, 5, 5, 0.75);
      border-color: rgba(255, 255, 255, 0.08);
    }

    /* Premium card depth */
    .dark .card-glow {
      position: relative;
      background: linear-gradient(180deg, rgba(24, 24, 27, 0.8) 0%, rgba(9, 9, 11, 1) 100%);
    }
    
    .dark .card-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Custom progress bar animation */
    @keyframes progress-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .animate-shimmer {
      background: linear-gradient(90deg, #1d4ed8 25%, #3b82f6 50%, #1d4ed8 75%);
      background-size: 200% 100%;
      animation: progress-shimmer 2.5s infinite linear;
    }

    /* Subtle text glow for prominent elements in dark mode */
    .dark .text-glow {
      text-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
    }
  </style>

</html>
